<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Verification</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/calendar.css">
    <link rel="stylesheet" href="../css/themes.css">
    <style>
        body { padding: 20px; background: #f0f2f5 !important; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .calendar-main { border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="margin-top:0">Calendar Grid Verification</h1>
        <div class="calendar-main" id="calendarMain">
            <!-- Grid will be injected here -->
        </div>
    </div>

    <script>
        // Mock dependencies
        window.escapeHtml = (s) => s ? String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : '';
        window.escapeAttr = (s) => s ? String(s).replace(/"/g, '&quot;') : '';

        // Mock calendarMgr used by global functions
        window.calendarMgr = {
            currentDate: new Date(2026, 4, 1), // May 2026
            selectedDate: new Date(2026, 4, 15),
            formatDateKey: (date) => {
                return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
            },
            getEventsForDate: (date) => {
                const key = window.calendarMgr.formatDateKey(date);
                if (key === '2026-05-15') return [{ title: 'Assignment 1', type: 'assignment' }];
                if (key === '2026-05-20') return [
                    { title: 'Quiz A', type: 'quiz' },
                    { title: 'Live Class', type: 'live' },
                    { title: 'Meeting', type: 'planner' }
                ];
                return [];
            }
        };
    </script>
    <script src="../calendar_logic.js"></script>
    <script>
        try {
            console.log('Rendering Grid View...');
            document.getElementById('calendarMain').innerHTML = renderGridView();
            console.log('Render complete.');
        } catch (e) {
            console.error('Render error:', e);
            document.getElementById('calendarMain').innerHTML = '<div style="color:red">Error: ' + e.message + '</div>';
        }
    </script>
</body>
</html>
